
<html>
<head>
</head>
<body>
<script type="text/javascript">
    
    

var n1, n2, n3;

 n1 = 3; 
 n2 = 5; 
 n3 = 2;


var num;
//ALERTA Y LECTURA 
num = prompt('Seleccion: 1 = SUMA| 2 = RESTA| 3 = SUMA & RESTA ','');
num = parseInt(num);//LECTURA Y PASAJE A ENTERO


//SWITCH
switch(num)
{
case 1:
document.write("Has elegido el numero 1<br>");
suma(n1,n2,n3);
break;

case 2:
document.write("Has elegido el numero 2<br>");
resta(n1,n2,n3);
break;

case 3:
document.write("Has elegido el numero 3<br>");
suma(n1,n2,n3);
resta(n1,n2,n3);
break;

default:
document.write("Has elegido un numero diferente");
document.write("<br>");
break;
}








//FUNCIONES
function suma(num1, num2, num3)
{
var suma;
suma = num1 + num2 + num3;
document.write("<br>LA SUMA ES = ", suma);
}

function resta(num1, num2, num3)
{
var resta;
resta = num1 - num2 - num3;
document.write("<br>LA RESTA ES = ", resta);
}


</script>
</body>
</html>
