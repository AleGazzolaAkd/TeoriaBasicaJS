<html>
<head>
</head>
<body>
<script type="text/javascript">
//Radiobutton
    function mostrarSeleccionado()
	{
		if (document.getElementById('radio1').checked)
		{
		  alert('Has seleccionado la opcion 1');
		}
		if (document.getElementById('radio2').checked)
		{
		  alert('Has seleccionado la opcion 2');
		}
		if (document.getElementById('radio3').checked)
		{
		  alert('Has seleccionado la opcion 3');
		}
	}

</script>
<form>
<input type="radio" id="radio1" name="Grupo">Opcion 1
<br>
<input type="radio" id="radio2" name="Grupo">Opcion 2
<br>
<input type="radio" id="radio3" name="Grupo">Opcion 3
<br><br>
<input type="button" value="Mostrar" onClick="mostrarSeleccionado()">
</form>
</body>
</html>
